let supabaseClient = null;

function initSupabase(url, anonKey) {
  try {
    supabaseClient = window.supabase.createClient(url, anonKey);
    return true;
  } catch (e) {
    console.error("Supabase init error:", e);
    return false;
  }
}

const db = {
  async getAll(table, orderBy = "created_at", dir = "desc") {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from(table)
        .select("*")
        .order(orderBy, { ascending: dir !== "desc" });

      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error("DB get:", e);
      return [];
    }
  },

  async add(table, payload) {
    if (!supabaseClient) return null;
    try {
      const row = { ...payload };
      if (!row.created_at) row.created_at = new Date().toISOString();

      const { data, error } = await supabaseClient
        .from(table)
        .insert([row])
        .select()
        .single();

      if (error) throw error;
      return data;
    } catch (e) {
      console.error("DB add:", e);
      return null;
    }
  },

  async update(table, id, payload) {
    if (!supabaseClient) return false;
    try {
      const { error } = await supabaseClient
        .from(table)
        .update(payload)
        .eq("id", id);

      if (error) throw error;
      return true;
    } catch (e) {
      console.error("DB update:", e);
      return false;
    }
  },

  async upsertCustomer(phone, payload) {
    if (!supabaseClient) return false;
    try {
      const row = { phone, ...payload };
      if (!row.updated_at) row.updated_at = new Date().toISOString();

      const { error } = await supabaseClient
        .from("customers")
        .upsert([row], { onConflict: "phone" });

      if (error) throw error;
      return true;
    } catch (e) {
      console.error("DB upsertCustomer:", e);
      return false;
    }
  },

  onBookingsSnapshot(callback) {
    if (!supabaseClient) return () => {};

    const channel = supabaseClient
      .channel("bookings-realtime")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "bookings" },
        async () => {
          const rows = await db.getAll("bookings", "booking_date", "desc");
          callback((rows || []).map(b => ({
            ...b,
            booking_date: b.booking_date || "",
            booking_time: b.booking_time || ""
          })));
        }
      )
      .subscribe();

    return () => {
      supabaseClient.removeChannel(channel);
    };
  }
};

    if(search&&!b.customer_name?.includes(search)&&!b.customer_phone?.includes(search)&&!String(b.id).includes(search))return false;
    return true;
  });
  const pg = filt.slice(page*perPage,(page+1)*perPage);
  const tPg = Math.ceil(filt.length/perPage);
  useEffect(()=>setPage(0),[branch,search,statusF]);

  const wk = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().split("T")[0];return{day:["أحد","اثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"][d.getDay()],c:bookings.filter(b=>b.booking_date===ds&&b.status==="confirmed").length,t:ds===today};});
  const mxW=Math.max(...wk.map(d=>d.c),1);

  const fmtPh=p=>{let c=p.replace(/\D/g,"");if(c.startsWith("00"))c=c.slice(2);if(c.startsWith("0"))c="966"+c.slice(1);if(!c.startsWith("966"))c="966"+c;return c;};

  // ═══ Auto-Reminder ═══
  useEffect(()=>{
    if(!autoRem||!waOk)return;
    const check = async()=>{
      const now=new Date(),ts=now.toISOString().split("T")[0];
      const conf=bookings.filter(b=>b.booking_date===ts&&b.status==="confirmed"&&!reminded.has(b.id));
      let closest=null;
      for(const bk of conf){
        const [h,m]=bk.booking_time.split(":");let hr=parseInt(h);if(hr<8)hr+=12;
        const apt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hr,parseInt(m));
        const diff=new Date(apt.getTime()-remMin*60000).getTime()-now.getTime();
        if(diff>0&&(!closest||diff<closest.diff))closest={booking:bk,diff,time:bk.booking_time};
        if(diff<=0&&diff>-60000){
          try{await fetch("https://whatsbot.at/api/send_pedido",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:fmtPh(bk.customer_phone),type:"text",message:MSG.reminder(bk),instance_id:waInst,access_token:waToken})});
          setReminded(p=>new Set([...p,bk.id]));
          setBookings(p=>p.map(b=>b.id===bk.id?{...b,reminded:true}:b));
          if(dbConnected)db.update("bookings",bk.id,{reminded:true});
          setToast({msg:`⏰ تذكير: تم إشعار ${bk.customer_name}`,type:"success"});}catch{}
        }
      }
      setNextRem(closest?{name:closest.booking.customer_name,time:closest.time,min:Math.ceil(closest.diff/60000)}:null);
    };
    check();const i=setInterval(check,30000);return()=>clearInterval(i);
  },[autoRem,waOk,bookings,reminded,remMin,waInst,waToken]);

  // ═══ WhatsBot Send ═══
  const sendWA = async(bk,type,reason)=>{
    if(!waOk){setToast({msg:"أدخل Instance ID أولاً",type:"error"});return false;}
    setSending(true);
    try{
      const message=type==="cancellation"?MSG[type](bk,reason):MSG[type](bk);
      const res=await fetch("https://whatsbot.at/api/send_pedido",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:fmtPh(bk.customer_phone),type:"text",message,instance_id:waInst,access_token:waToken})});
      if(res.ok){setToast({msg:`تم إرسال ${type==="confirmation"?"تأكيد":type==="reminder"?"تذكير":"إلغاء"} لـ ${bk.customer_name} ✓`,type:"success"});if(dbConnected)db.update("bookings",bk.id,{notified:true});setBookings(p=>p.map(b=>b.id===bk.id?{...b,notified:true}:b));return true;}
      else{setToast({msg:`فشل: ${res.status}`,type:"error"});return false;}
    }catch(e){setToast({msg:`خطأ: ${e.message}`,type:"error"});return false;}
    finally{setSending(false);}
  };

  // ═══ Update Status ═══
  const updSt = async(bk,ns)=>{
    if(ns==="cancelled"){setCancelModal(bk);setCancelReason("");return;}
    if(dbConnected)db.update("bookings",bk.id,{status:ns});
    setBookings(p=>p.map(b=>b.id===bk.id?{...b,status:ns}:b));
    const up={...bk,status:ns};
    if(ns==="confirmed"&&autoConf&&waOk)await sendWA(up,"confirmation");
    setSel(up);
  };

  const confirmCancel = async()=>{
    if(!cancelModal)return;const bk=cancelModal,reason=cancelReason.trim();
    if(!reason){setToast({msg:"يرجى إدخال سبب الإلغاء",type:"error"});return;}
    if(dbConnected)db.update("bookings",bk.id,{status:"cancelled",cancel_reason:reason});
    setBookings(p=>p.map(b=>b.id===bk.id?{...b,status:"cancelled",cancel_reason:reason}:b));
    if(autoCanc&&waOk)await sendWA({...bk,status:"cancelled"},"cancellation",reason);
    setSel({...bk,status:"cancelled"});setCancelModal(null);setCancelReason("");
    setToast({msg:`تم إلغاء حجز ${bk.customer_name} ✓`,type:"success"});
  };

  // Bulk
  const sendBulk = async()=>{
    if(!waOk||!bulkMsg.trim())return;
    const tg=bulkTarget==="all"?customers:customers.filter(c=>c.branch===(bulkTarget==="riyadh"?"الرياض":"الدمام"));
    setBulkProg({s:0,t:tg.length,on:true});let s=0;
    for(const c of tg){try{await fetch("https://whatsbot.at/api/send_pedido",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:fmtPh(c.phone),type:"text",message:`💈 إبداع عمار\n\nمرحباً ${c.name}،\n${bulkMsg}`,instance_id:waInst,access_token:waToken})});s++;}catch{}setBulkProg({s,t:tg.length,on:true});await new Promise(r=>setTimeout(r,1500));}
    setBulkProg({s,t:tg.length,on:false});setToast({msg:`تم إرسال ${s}/${tg.length} رسالة ✓`,type:"success"});
  };

  // Redeem
  const confirmRedeem = async()=>{
    if(!redeemModal)return;const{customer:c,reward:rw}=redeemModal;
    const nr={...redemptions};if(!nr[c.phone])nr[c.phone]=[];
    nr[c.phone].push({name:rw.name,points:rw.points,discount:rw.discount,date:today});
    setRedemptions(nr);
    if(dbConnected)db.add("redemptions",{customer_phone:c.phone,reward_name:rw.name,points_used:rw.points,discount_amount:rw.discount});
    if(waOk){try{await fetch("https://whatsbot.at/api/send_pedido",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:fmtPh(c.phone),type:"text",message:`🎁 مكافأة ولاء - إبداع عمار\n\nمرحباً ${c.name}،\nتم استبدال نقاطك!\n\n🏆 ${rw.name}\n⭐ مستخدم: ${rw.points} نقطة\n📊 المتبقي: ${getAvailPts(c)-rw.points}\n\nأبرز الكوبون عند زيارتك. 💈`,instance_id:waInst,access_token:waToken})});setToast({msg:`تم استبدال ${rw.points} نقطة ✓`,type:"success"});}catch{setToast({msg:"تم الاستبدال",type:"info"});}}
    setRedeemModal(null);
  };

  const inp={width:"100%",padding:"12px 14px",background:"#1a1a30",border:"1px solid #2a2a4a",borderRadius:10,color:"#e0e0f0",fontSize:14,fontFamily:"'Tajawal',sans-serif",outline:"none"};

  // ═══════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════
  return(
    <div style={{direction:"rtl",fontFamily:"'Tajawal',sans-serif",background:"#0b0b18",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative",paddingBottom:72,color:"#e0e0f0"}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{display:none}input::placeholder,textarea::placeholder{color:#555578}textarea{resize:vertical}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}.ct:active{transform:scale(0.97);opacity:0.9}.ch:active{transform:scale(0.95)}.bt:active{transform:scale(0.95);opacity:0.85}`}</style>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}

      {/* Header */}
      <div style={{padding:"20px 20px 16px",background:"linear-gradient(180deg,#131328,#0b0b18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#666680",marginBottom:2}}>{new Date().toLocaleDateString("ar-SA",{weekday:"long",day:"numeric",month:"long"})}</div>
            <h1 style={{fontSize:20,fontWeight:800,color:"#fff",margin:0}}>إبداع عمار 💈</h1>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {dbConnected&&<span style={{fontSize:9,background:"#16a34a22",color:"#22c55e",padding:"3px 8px",borderRadius:10}}>⚡ SB</span>}
            {waOk&&<span style={{fontSize:9,background:"#25d36622",color:"#34d399",padding:"3px 8px",borderRadius:10}}>WA ✓</span>}
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#c0a062,#8b6914)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff"}}>ع</div>
          </div>
        </div>
      </div>

      {/* ═══ HOME ═══ */}
      {tab==="home"&&!sub&&(<div style={{padding:"0 16px",animation:"fadeUp 0.3s ease"}}>
        {!dbConnected&&(<div onClick={()=>{setTab("settings");setShowDb(true);}} className="ct" style={{background:"#1a1a40",border:"1px solid #ff990033",borderRadius:12,padding:"12px 16px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:18}}>🔥</span><div><div style={{fontSize:13,fontWeight:700,color:"#22c55e"}}>ربط Supabase</div><div style={{fontSize:11,color:"#22c55e88"}}>اضغط للإعداد</div></div></div>)}

        {autoRem&&waOk&&nextRem&&(<div style={{background:"linear-gradient(135deg,#1a1a40,#131328)",border:"1px solid #818cf833",borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,animation:"pulse 2s infinite"}}>⏰</span><div><div style={{fontSize:12,fontWeight:700,color:"#818cf8"}}>التذكير القادم</div><div style={{fontSize:11,color:"#8b8ba3"}}>{nextRem.name} — {nextRem.time}</div></div></div><div style={{background:"#818cf822",padding:"4px 10px",borderRadius:8}}><span style={{fontSize:12,fontWeight:800,color:"#818cf8"}}>{nextRem.min} د</span></div></div>)}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          {[{i:"📅",l:"اليوم",v:todayBk.length,a:"#34d399"},{i:"💰",l:"الشهر",v:`${(mRev/1000).toFixed(1)}K`,a:"#c0a062"},{i:"⏳",l:"بانتظار",v:pCount,a:"#fbbf24"},{i:"👥",l:"عملاء",v:customers.length,a:"#818cf8"}].map((s,i)=>(<div key={i} style={{background:"#131328",borderRadius:14,padding:"14px 12px",borderRight:`3px solid ${s.a}`}}><div style={{fontSize:20,marginBottom:4}}>{s.i}</div><div style={{fontSize:10,color:"#8b8ba3"}}>{s.l}</div><div style={{fontSize:22,fontWeight:800,color:"#fff"}}>{s.v}</div></div>))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[{i:"📨",l:"رسائل جماعية",a:()=>setSub("bulk")},{i:"📅",l:"التقويم",a:()=>setToast({msg:"اضغط أي حجز → إضافة للتقويم",type:"info"})},{i:"🔄",l:"تحديث",a:loadBookings}].map((x,i)=>(<div key={i} className="bt" onClick={x.a} style={{background:"#131328",borderRadius:12,padding:"12px 8px",textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22,marginBottom:4}}>{x.i}</div><div style={{fontSize:10,fontWeight:600,color:"#8b8ba3"}}>{x.l}</div></div>))}
        </div>

        {/* Weekly */}
        <div style={{background:"#131328",borderRadius:14,padding:14,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:12}}>📈 الأسبوع</div>
          {wk.map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:11,color:d.t?"#c0a062":"#666680",width:38,textAlign:"left",fontWeight:d.t?700:400}}>{d.day}</span><div style={{flex:1,height:20,background:"#1a1a30",borderRadius:5,overflow:"hidden"}}><div style={{width:`${Math.max((d.c/mxW)*100,2)}%`,height:"100%",background:d.t?"linear-gradient(90deg,#c0a062,#d4b878)":"#2a2a5a",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"flex-end"}}>{d.c>0&&<span style={{fontSize:10,fontWeight:700,color:d.t?"#fff":"#888",paddingRight:5}}>{d.c}</span>}</div></div></div>))}
        </div>

        {/* Today */}
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>📋 حجوزات اليوم</span><span onClick={()=>setTab("bookings")} style={{fontSize:11,color:"#c0a062",cursor:"pointer"}}>الكل ←</span></div>
        {todayBk.length===0?<div style={{background:"#131328",borderRadius:12,padding:20,textAlign:"center",color:"#555578",fontSize:12}}>لا يوجد حجوزات</div>
        :todayBk.slice(0,4).map((b,i)=>(<div key={b.id} className="ct" onClick={()=>setSel(b)} style={{background:"#131328",borderRadius:12,padding:"12px 14px",marginBottom:6,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{b.customer_name}</span><Badge status={b.status} small/>{b.reminded&&<span style={{fontSize:9,color:"#818cf8"}}>⏰</span>}</div><div style={{fontSize:11,color:"#666680"}}>{b.service} · {b.booking_time} · {b.branch}</div></div><span style={{fontSize:14,fontWeight:800,color:"#c0a062"}}>{b.price}<span style={{fontSize:9}}> ر.س</span></span></div></div>))}
      </div>)}

      {/* ═══ BULK ═══ */}
      {tab==="home"&&sub==="bulk"&&(<div style={{padding:"0 16px",animation:"fadeUp 0.3s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><span onClick={()=>setSub(null)} style={{fontSize:20,cursor:"pointer",color:"#c0a062"}}>→</span><h2 style={{fontSize:17,fontWeight:800,color:"#fff",margin:0}}>📨 رسائل جماعية</h2></div>
        <div style={{background:"#131328",borderRadius:14,padding:16,marginBottom:12}}>
          <div style={{display:"flex",gap:6,marginBottom:12}}>{[["all","الكل",customers.length],["riyadh","الرياض",customers.filter(c=>c.branch==="الرياض").length],["dammam","الدمام",customers.filter(c=>c.branch==="الدمام").length]].map(([v,l,n])=>(<button key={v} className="ch" onClick={()=>setBulkTarget(v)} style={{flex:1,padding:"8px",borderRadius:10,border:"none",background:bulkTarget===v?"linear-gradient(135deg,#c0a062,#8b6914)":"#1a1a30",color:bulkTarget===v?"#fff":"#8b8ba3",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Tajawal',sans-serif"}}>{l}<br/><span style={{fontSize:9}}>{n}</span></button>))}</div>
          <textarea value={bulkMsg} onChange={e=>setBulkMsg(e.target.value)} placeholder="اكتب رسالتك..." rows={3} style={{...inp,direction:"rtl",textAlign:"right",minHeight:80}}/>
          {bulkProg.on&&<div style={{marginTop:10}}><div style={{height:5,background:"#1a1a30",borderRadius:3,overflow:"hidden"}}><div style={{width:`${(bulkProg.s/bulkProg.t)*100}%`,height:"100%",background:"#34d399",borderRadius:3}}/></div><div style={{fontSize:11,color:"#8b8ba3",marginTop:4,textAlign:"center"}}>{bulkProg.s}/{bulkProg.t}</div></div>}
          <button className="bt" disabled={!waOk||!bulkMsg.trim()||bulkProg.on} onClick={sendBulk} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:"#25d366",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',sans-serif",marginTop:10,opacity:(!waOk||!bulkMsg.trim())?0.5:1}}>{bulkProg.on?`${bulkProg.s}/${bulkProg.t}`:"💬 إرسال"}</button>
        </div>
        <div style={{background:"#131328",borderRadius:14,padding:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:8}}>📝 قوالب:</div>
          {["🔥 خصم 15% على تركيب الشعر هذا الأسبوع!","⭐ أوقات العمل: السبت-الخميس 9ص-9م","🎁 استشارة مجانية عند أول زيارة!"].map((m,i)=>(<div key={i} className="ct" onClick={()=>setBulkMsg(m)} style={{padding:"8px 10px",background:"#1a1a30",borderRadius:8,marginBottom:4,cursor:"pointer",fontSize:11,color:"#8b8ba3"}}>{m}</div>))}
        </div>
      </div>)}

      {/* ═══ BOOKINGS ═══ */}
      {tab==="bookings"&&(<div style={{padding:"0 16px",animation:"fadeUp 0.3s ease"}}>
        <div style={{position:"relative",marginBottom:10}}><span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#555578"}}>🔍</span><input type="text" placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,padding:"11px 36px 11px 11px",direction:"rtl",textAlign:"right"}}/></div>
        <div style={{display:"flex",gap:5,marginBottom:6,overflowX:"auto",paddingBottom:3}}>
          {["الكل","الرياض","الدمام"].map(b=>(<button key={b} className="ch" onClick={()=>setBranch(b)} style={{padding:"6px 12px",borderRadius:18,border:"none",background:branch===b?"linear-gradient(135deg,#c0a062,#8b6914)":"#1a1a30",color:branch===b?"#fff":"#8b8ba3",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Tajawal',sans-serif",whiteSpace:"nowrap"}}>{b}</button>))}
          <div style={{width:1,background:"#2a2a4a",margin:"0 2px",flexShrink:0}}/>
          {["الكل","confirmed","pending","cancelled"].map(s=>(<button key={s} className="ch" onClick={()=>setStatusF(s)} style={{padding:"6px 10px",borderRadius:18,border:"none",background:statusF===s?"#2a2a4a":"#1a1a30",color:statusF===s?"#fff":"#8b8ba3",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Tajawal',sans-serif",whiteSpace:"nowrap"}}>{s==="الكل"?"الكل":STATUSES[s]}</button>))}
        </div>
        <div style={{fontSize:11,color:"#555578",marginBottom:8}}>{filt.length} حجز</div>
        {pg.map((b,i)=>(<div key={b.id} className="ct" onClick={()=>setSel(b)} style={{background:"#131328",borderRadius:12,padding:"12px 14px",marginBottom:6,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{b.customer_name}</span><Badge status={b.status} small/>{b.notified&&<span style={{fontSize:9,color:"#34d399"}}>✓</span>}{b.reminded&&<span style={{fontSize:9,color:"#818cf8"}}>⏰</span>}</div><span style={{fontSize:10,color:"#555578"}}>#{(b.id||"").toString().slice(-6)}</span></div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"#8b8ba3"}}>✂️{b.service} · 📍{b.branch}</span><span style={{fontSize:13,fontWeight:800,color:"#c0a062"}}>{b.price}<span style={{fontSize:9}}> ر.س</span></span></div><div style={{fontSize:10,color:"#555578",marginTop:4}}>📅 {b.booking_date} · 🕐 {b.booking_time}</div></div>))}
        {tPg>1&&<div style={{display:"flex",justifyContent:"center",gap:12,padding:"12px 0"}}><button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:page===0?"#131328":"#2a2a4a",color:page===0?"#333":"#fff",fontSize:12,fontWeight:600,cursor:page===0?"default":"pointer",fontFamily:"'Tajawal',sans-serif"}}>←</button><span style={{fontSize:12,color:"#8b8ba3",alignSelf:"center"}}>{page+1}/{tPg}</span><button disabled={page>=tPg-1} onClick={()=>setPage(p=>p+1)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:page>=tPg-1?"#131328":"#2a2a4a",color:page>=tPg-1?"#333":"#fff",fontSize:12,fontWeight:600,cursor:page>=tPg-1?"default":"pointer",fontFamily:"'Tajawal',sans-serif"}}>→</button></div>}
      </div>)}

      {/* ═══ CUSTOMERS ═══ */}
      {tab==="customers"&&!selCust&&(<div style={{padding:"0 16px",animation:"fadeUp 0.3s ease"}}>
        <h2 style={{fontSize:17,fontWeight:800,color:"#fff",margin:"0 0 12px"}}>👥 العملاء ({customers.length})</h2>
        <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
          {TIERS.map((t,i)=>{const n=customers.filter(c=>getTier(c.points)===t).length;return(<div key={i} style={{flex:"0 0 auto",minWidth:80,background:t.bg,border:`1px solid ${t.color}22`,borderRadius:12,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:20}}>{t.icon}</div><div style={{fontSize:10,color:t.color,fontWeight:700,marginTop:2}}>{t.name}</div><div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{n}</div></div>);})}

        <div onClick={e=>e.stopPropagation()} style={{background:"#131328",borderRadius:20,padding:"24px 20px",width:"92%",maxWidth:400,animation:"fadeUp 0.3s ease",border:"1px solid #3b1118"}}>
          <div style={{textAlign:"center",marginBottom:20}}><div style={{width:56,height:56,borderRadius:16,background:"#3b111844",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>❌</div><h3 style={{fontSize:18,fontWeight:800,color:"#fff",margin:"0 0 4px"}}>إلغاء الحجز</h3><p style={{fontSize:13,color:"#8b8ba3",margin:0}}>{cancelModal.customer_name}</p></div>
          <div style={{fontSize:12,fontWeight:700,color:"#e0e0f0",marginBottom:8}}>📌 اختر السبب:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>{CANCEL_REASONS.map((r,i)=>(<button key={i} className="ch" onClick={()=>setCancelReason(r)} style={{padding:"7px 12px",borderRadius:20,border:cancelReason===r?"1px solid #f8717155":"1px solid transparent",background:cancelReason===r?"#f8717133":"#1a1a30",color:cancelReason===r?"#f87171":"#8b8ba3",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Tajawal',sans-serif"}}>{r}</button>))}</div>
          <div style={{fontSize:12,fontWeight:700,color:"#e0e0f0",marginBottom:6}}>✏️ أو اكتب:</div>
          <textarea value={cancelReason} onChange={e=>setCancelReason(e.target.value)} placeholder="سبب الإلغاء..." rows={3} style={{...inp,direction:"rtl",textAlign:"right",minHeight:70,marginBottom:14}}/>
          {cancelReason&&(<div style={{background:"#0d0d1a",borderRadius:10,padding:"10px 12px",marginBottom:14,borderRight:"3px solid #f87171"}}><div style={{fontSize:10,color:"#f87171",fontWeight:700,marginBottom:6}}>معاينة:</div><div style={{fontSize:11,color:"#8b8ba3",lineHeight:1.6,whiteSpace:"pre-line"}}>{"❌ إلغاء حجز\nمرحباً "+cancelModal.customer_name+",\n📌 السبب: "+cancelReason+"\nيمكنك إعادة الحجز 🙏"}</div></div>)}
          <div style={{display:"flex",gap:10}}>
            <button className="bt" onClick={()=>{setCancelModal(null);setCancelReason("");}} style={{flex:1,padding:13,borderRadius:12,border:"1px solid #2a2a4a",background:"transparent",color:"#8b8ba3",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',sans-serif"}}>تراجع</button>
            <button className="bt" disabled={!cancelReason.trim()||sending} onClick={confirmCancel} style={{flex:1,padding:13,borderRadius:12,border:"none",background:!cancelReason.trim()?"#2a2a4a":"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",fontSize:14,fontWeight:700,cursor:(!cancelReason.trim()||sending)?"default":"pointer",fontFamily:"'Tajawal',sans-serif",opacity:(!cancelReason.trim()||sending)?0.5:1}}>{sending?"⏳":"❌ تأكيد الإلغاء"}</button>
          </div>
        </div>
      </div>)}

      {/* ═══ Redeem Modal ═══ */}
      {redeemModal&&(<div onClick={()=>setRedeemModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:160}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#131328",borderRadius:20,padding:"24px 20px",width:"92%",maxWidth:400,animation:"fadeUp 0.3s ease",border:"1px solid #c0a06233"}}>
          <div style={{textAlign:"center",marginBottom:18}}><div style={{width:60,height:60,borderRadius:16,background:"#c0a06215",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>{redeemModal.reward.icon}</div><h3 style={{fontSize:18,fontWeight:800,color:"#fff",margin:"0 0 6px"}}>تأكيد الاستبدال</h3><p style={{fontSize:13,color:"#8b8ba3",margin:0}}>{redeemModal.customer.name}</p></div>
          <div style={{background:"#1a1a30",borderRadius:12,padding:14,marginBottom:16}}>{[["🎁",redeemModal.reward.name],["⭐",redeemModal.reward.points+" نقطة"],["💰","خصم "+redeemModal.reward.discount+" ر.س"],["📊",(getAvailPts(redeemModal.customer)-redeemModal.reward.points)+" متبقي"]].map(([i,v],j)=>(<div key={j} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:j<3?"1px solid #2a2a4a":"none"}}><span style={{fontSize:12,color:"#8b8ba3"}}>{i}</span><span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{v}</span></div>))}</div>
          <div style={{display:"flex",gap:10}}>
            <button className="bt" onClick={()=>setRedeemModal(null)} style={{flex:1,padding:13,borderRadius:12,border:"1px solid #2a2a4a",background:"transparent",color:"#8b8ba3",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',sans-serif"}}>إلغاء</button>
            <button className="bt" onClick={confirmRedeem} style={{flex:1,padding:13,borderRadius:12,border:"none",background:"linear-gradient(135deg,#c0a062,#8b6914)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',sans-serif"}}>🎁 تأكيد</button>
          </div>
        </div>
      </div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
