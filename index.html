<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<meta name="theme-color" content="#0b0b18" />
<title>إبداع عمار - لوحة التحكم (send-wa)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0b0b18;color:#e5e7eb;font-family:'Tajawal',sans-serif}
  button,input,textarea,select{font-family:'Tajawal',sans-serif}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const DEFAULT_SB_URL = "https://vmbaxqghabxzvkcxwjdy.supabase.co";
const DEFAULT_SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtYmF4cWdoYWJ4enZrY3h3amR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODI3NzQsImV4cCI6MjA4OTc1ODc3NH0.HGpFOtSqhhrn-kNQZU0IDVY7j6lzMkSNL2Z8_fLRbSY";
const SEND_WA_URL = "https://vmbaxqghabxzvkcxwjdy.supabase.co/functions/v1/send-wa";

const STATUS_LABELS = {
  pending: "بانتظار",
  confirmed: "مؤكد",
  cancelled: "ملغي",
};

const STATUS_STYLES = {
  pending: { bg:"#3b2f0a", color:"#fbbf24" },
  confirmed: { bg:"#0d3320", color:"#34d399" },
  cancelled: { bg:"#3b1118", color:"#f87171" },
};

const PTS = { "تركيب شعر": 50, "تغيير لاصق": 10 };
const ATT_BONUS = 5;

function bookingShortId(id) {
  return String(id ?? "").slice(-6);
}

function makeMessage(type, booking, reason = "") {
  const pts = PTS[booking.service] || 0;
  const shortId = bookingShortId(booking.id);

  if (type === "confirmation") {
    return `✅ تأكيد حجز - إبداع عمار

مرحباً ${booking.customer_name}،
تم تأكيد حجزك!

📋 #${shortId}
✂️ ${booking.service}
📍 ${booking.branch}
📅 ${booking.booking_date}
🕐 ${booking.booking_time}
💰 ${booking.price} ر.س

⭐ ستحصل على ${pts + ATT_BONUS} نقطة ولاء!

نتطلع لخدمتكم! 💈`;
  }

  if (type === "reminder") {
    return `⏰ تذكير - إبداع عمار

مرحباً ${booking.customer_name}،
موعدك قريب.

📅 ${booking.booking_date}
🕐 ${booking.booking_time}
📍 ${booking.branch}
✂️ ${booking.service}

في انتظاركم 💈`;
  }

  return `❌ إلغاء حجز - إبداع عمار

مرحباً ${booking.customer_name}،
تم إلغاء حجزك.

✂️ ${booking.service}
📍 ${booking.branch}
📅 ${booking.booking_date}
🕐 ${booking.booking_time}
${reason ? `\n📌 السبب: ${reason}\n` : ""}
يمكنك إعادة الحجز. 🙏`;
}

function Badge({ status }) {
  const s = STATUS_STYLES[status] || STATUS_STYLES.pending;
  return (
    <span style={{
      display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",
      borderRadius:999,background:s.bg,color:s.color,fontSize:12,fontWeight:700
    }}>
      <span style={{width:6,height:6,borderRadius:"50%",background:s.color}} />
      {STATUS_LABELS[status] || status}
    </span>
  );
}

function SectionCard({ children, style }) {
  return <div style={{background:"#131328",borderRadius:16,padding:16,...style}}>{children}</div>;
}

function App() {
  const [sbUrl, setSbUrl] = useState(DEFAULT_SB_URL);
  const [sbKey, setSbKey] = useState(DEFAULT_SB_KEY);
  const [client, setClient] = useState(null);
  const [connected, setConnected] = useState(false);
  const [bookings, setBookings] = useState([]);
  const [selected, setSelected] = useState(null);

  const [loading, setLoading] = useState(false);
  const [sending, setSending] = useState(false);
  const [toast, setToast] = useState(null);

  const [search, setSearch] = useState("");
  const [branch, setBranch] = useState("الكل");
  const [statusFilter, setStatusFilter] = useState("الكل");
  const [cancelReason, setCancelReason] = useState("");

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 3500);
    return () => clearTimeout(t);
  }, [toast]);

  async function connectNow() {
    try {
      const supabase = window.supabase.createClient(sbUrl, sbKey);
      setClient(supabase);
      setConnected(true);
      setToast({ type:"success", msg:"تم الاتصال بقاعدة البيانات" });
      await loadAll(supabase);
    } catch (e) {
      console.error(e);
      setToast({ type:"error", msg:"فشل الاتصال بـ Supabase" });
    }
  }

  async function loadAll(activeClient = client) {
    if (!activeClient) return;
    setLoading(true);
    try {
      const { data, error } = await activeClient
        .from("bookings")
        .select("*")
        .order("booking_date", { ascending: false });

      if (error) throw error;
      setBookings(data || []);
    } catch (e) {
      console.error("loadAll error:", e);
      setToast({ type:"error", msg:`تعذر تحميل البيانات: ${e.message || "خطأ غير معروف"}` });
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { connectNow(); }, []);

  async function updateBooking(id, payload) {
    if (!client) return false;
    try {
      const { error } = await client.from("bookings").update(payload).eq("id", id);
      if (error) throw error;
      await loadAll();
      return true;
    } catch (e) {
      console.error("updateBooking error:", e);
      setToast({ type:"error", msg:`فشل تحديث الحجز: ${e.message || "خطأ"}` });
      return false;
    }
  }

  async function sendWA(booking, type, reason = "") {
    try {
      setSending(true);
      const message = makeMessage(type, booking, reason);

      const res = await fetch(SEND_WA_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          phone: booking.customer_phone,
          message: message
        })
      });

      const data = await res.json().catch(async () => ({ ok:false, error: await res.text() }));
      console.log("send-wa status:", res.status);
      console.log("send-wa response:", data);

      if (!res.ok || !data.ok) {
        throw new Error(data.error || data.response || `send-wa ${res.status}`);
      }

      if (client && booking?.id) {
        await client.from("bookings").update({ notified: true }).eq("id", booking.id);
      }

      setToast({ type:"success", msg:`تم إرسال الرسالة إلى ${booking.customer_name}` });
      await loadAll();
      return true;
    } catch (e) {
      console.error("sendWA error:", e);
      setToast({ type:"error", msg:`فشل الإرسال: ${e.message || "خطأ غير معروف"}` });
      return false;
    } finally {
      setSending(false);
    }
  }

  async function confirmBooking(booking) {
    const ok = await updateBooking(booking.id, { status:"confirmed" });
    if (ok) {
      await sendWA({ ...booking, status:"confirmed" }, "confirmation");
      setSelected({ ...booking, status:"confirmed", notified:true });
    }
  }

  async function cancelBooking(booking) {
    if (!cancelReason.trim()) {
      setToast({ type:"error", msg:"اكتب سبب الإلغاء" });
      return;
    }

    const ok = await updateBooking(booking.id, {
      status:"cancelled",
      cancel_reason: cancelReason.trim()
    });

    if (ok) {
      await sendWA(
        { ...booking, status:"cancelled", cancel_reason: cancelReason.trim() },
        "cancellation",
        cancelReason.trim()
      );
      setSelected({ ...booking, status:"cancelled", cancel_reason: cancelReason.trim(), notified:true });
      setCancelReason("");
    }
  }

  const filteredBookings = useMemo(() => {
    return bookings.filter(b => {
      if (branch !== "الكل" && b.branch !== branch) return false;
      if (statusFilter !== "الكل" && b.status !== statusFilter) return false;
      if (search.trim()) {
        const q = search.trim();
        return String(b.customer_name || "").includes(q)
          || String(b.customer_phone || "").includes(q)
          || String(b.id || "").includes(q);
      }
      return true;
    });
  }, [bookings, branch, statusFilter, search]);

  const stats = useMemo(() => {
    const confirmed = bookings.filter(b => b.status === "confirmed");
    const pending = bookings.filter(b => b.status === "pending");
    const revenue = confirmed.reduce((s, b) => s + Number(b.price || 0), 0);

    return {
      total: bookings.length,
      confirmed: confirmed.length,
      pending: pending.length,
      revenue,
    };
  }, [bookings]);

  return (
    <div style={{maxWidth:520,margin:"0 auto",padding:"18px 16px 90px"}}>
      {toast && (
        <div style={{
          position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",
          background:"#111827",color:"#fff",padding:"12px 18px",borderRadius:14,
          border:`1px solid ${toast.type==="error" ? "#ef4444" : toast.type==="success" ? "#10b981" : "#3b82f6"}`,
          zIndex:9999,fontSize:13,fontWeight:700,maxWidth:"90vw"
        }}>
          {toast.msg}
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:12,color:"#9ca3af"}}>{new Date().toLocaleDateString("ar-SA")}</div>
          <div style={{fontSize:26,fontWeight:900}}>إبداع عمار 💈</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <span style={{background:connected ? "#052e16" : "#3f1d1d",color:connected ? "#34d399" : "#f87171",padding:"6px 10px",borderRadius:999,fontSize:11,fontWeight:700}}>
            {connected ? "SB ✓" : "SB ✕"}
          </span>
          <span style={{background:"#052e16",color:"#34d399",padding:"6px 10px",borderRadius:999,fontSize:11,fontWeight:700}}>
            send-wa ✓
          </span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <SectionCard><div style={{fontSize:12,color:"#9ca3af"}}>إجمالي الحجوزات</div><div style={{fontSize:26,fontWeight:900}}>{stats.total}</div></SectionCard>
        <SectionCard><div style={{fontSize:12,color:"#9ca3af"}}>المؤكدة</div><div style={{fontSize:26,fontWeight:900,color:"#34d399"}}>{stats.confirmed}</div></SectionCard>
        <SectionCard><div style={{fontSize:12,color:"#9ca3af"}}>بانتظار</div><div style={{fontSize:26,fontWeight:900,color:"#fbbf24"}}>{stats.pending}</div></SectionCard>
        <SectionCard><div style={{fontSize:12,color:"#9ca3af"}}>الإيراد</div><div style={{fontSize:26,fontWeight:900,color:"#f59e0b"}}>{stats.revenue} <span style={{fontSize:12}}>ر.س</span></div></SectionCard>
      </div>

      <SectionCard style={{marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>إعدادات Supabase</div>
        <div style={{display:"grid",gap:10}}>
          <input value={sbUrl} onChange={e=>setSbUrl(e.target.value)} placeholder="Supabase URL" style={inputStyle} />
          <textarea value={sbKey} onChange={e=>setSbKey(e.target.value)} placeholder="Supabase anon key" rows={3} style={{...inputStyle,minHeight:90}} />
          <div style={{display:"flex",gap:8}}>
            <button onClick={connectNow} style={btnGold}>إعادة الربط</button>
            <button onClick={()=>loadAll()} style={btnDark}>تحديث البيانات</button>
          </div>
        </div>
      </SectionCard>

      <SectionCard style={{marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>فلاتر الحجوزات</div>
        <div style={{display:"grid",gap:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="بحث بالاسم أو الجوال أو رقم الحجز" style={inputStyle} />
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <select value={branch} onChange={e=>setBranch(e.target.value)} style={inputStyle}>
              <option>الكل</option>
              <option>الرياض</option>
              <option>الدمام</option>
            </select>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={inputStyle}>
              <option>الكل</option>
              <option value="pending">بانتظار</option>
              <option value="confirmed">مؤكد</option>
              <option value="cancelled">ملغي</option>
            </select>
          </div>
        </div>
      </SectionCard>

      <SectionCard>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:800}}>الحجوزات</div>
          <div style={{fontSize:12,color:"#9ca3af"}}>{loading ? "تحميل..." : `${filteredBookings.length} نتيجة`}</div>
        </div>

        <div style={{display:"grid",gap:10}}>
          {filteredBookings.map(b => (
            <div key={String(b.id)} onClick={() => setSelected(b)} style={{
              background:"#1a1a30",borderRadius:14,padding:14,cursor:"pointer",border:"1px solid #24243c"
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:17,fontWeight:800}}>حجز #{bookingShortId(b.id)}</div>
                <Badge status={b.status} />
              </div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{b.customer_name}</div>
              <div style={{fontSize:12,color:"#9ca3af"}}>{b.customer_phone}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:10,fontSize:13}}>
                <div>📍 {b.branch}</div>
                <div>✂️ {b.service}</div>
                <div>📅 {b.booking_date}</div>
                <div>🕐 {b.booking_time}</div>
                <div>💰 {b.price} ر.س</div>
                <div>💳 {b.payment_method}</div>
              </div>
            </div>
          ))}
          {!filteredBookings.length && (
            <div style={{textAlign:"center",padding:"20px 0",color:"#9ca3af"}}>لا توجد حجوزات</div>
          )}
        </div>
      </SectionCard>

      {selected && (
        <div onClick={() => { setSelected(null); setCancelReason(""); }} style={{
          position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",
          alignItems:"flex-end",justifyContent:"center",zIndex:999
        }}>
          <div onClick={(e)=>e.stopPropagation()} style={{
            width:"100%",maxWidth:520,background:"#131328",borderRadius:"22px 22px 0 0",
            padding:"18px 16px 28px",maxHeight:"85vh",overflowY:"auto"
          }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:18,fontWeight:900}}>حجز #{bookingShortId(selected.id)}</div>
              <Badge status={selected.status} />
            </div>

            <div style={{display:"grid",gap:8}}>
              {[
                ["👤","الاسم",selected.customer_name],
                ["📱","الجوال",selected.customer_phone],
                ["🏢","الفرع",selected.branch],
                ["✂️","الخدمة",selected.service],
                ["💰","السعر",`${selected.price} ر.س`],
                ["📅","التاريخ",selected.booking_date],
                ["🕐","الوقت",selected.booking_time],
                ["💳","الدفع",selected.payment_method]
              ].map(([icon,label,val]) => (
                <div key={label} style={{display:"flex",justifyContent:"space-between",background:"#1a1a30",padding:"10px 12px",borderRadius:12}}>
                  <span style={{color:"#9ca3af"}}>{icon} {label}</span>
                  <span style={{fontWeight:700}}>{val}</span>
                </div>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
              {selected.status !== "confirmed" && <button disabled={sending} onClick={()=>confirmBooking(selected)} style={{...btnGreen,opacity:sending?0.6:1}}>✅ تأكيد الحجز</button>}
              <button disabled={sending} onClick={()=>sendWA(selected,"confirmation")} style={{...btnGold,opacity:sending?0.6:1}}>📨 إرسال تأكيد</button>
              <button disabled={sending} onClick={()=>sendWA(selected,"reminder")} style={{...btnDark,opacity:sending?0.6:1}}>⏰ إرسال تذكير</button>
              <button disabled={sending} onClick={()=>sendWA(selected,"cancellation", cancelReason.trim() || "تم إلغاء الحجز")} style={{...btnRed,opacity:sending?0.6:1}}>❌ إرسال إلغاء</button>
            </div>

            <div style={{marginTop:14}}>
              <textarea value={cancelReason} onChange={e=>setCancelReason(e.target.value)} rows={3} placeholder="سبب الإلغاء" style={{...inputStyle,minHeight:90}} />
              {selected.status !== "cancelled" && (
                <button disabled={sending} onClick={()=>cancelBooking(selected)} style={{...btnRed,marginTop:8,opacity:sending?0.6:1}}>
                  إلغاء الحجز مع إرسال السبب
                </button>
              )}
            </div>

            <button onClick={() => { setSelected(null); setCancelReason(""); }} style={{...btnDark,marginTop:12}}>إغلاق</button>
          </div>
        </div>
      )}
    </div>
  );
}

const inputStyle = {
  width:"100%",
  background:"#1a1a30",
  border:"1px solid #2a2a4a",
  color:"#fff",
  borderRadius:12,
  padding:"12px 14px",
  outline:"none",
  fontSize:14
};

const btnBase = {
  width:"100%",
  border:"none",
  borderRadius:12,
  padding:"12px 14px",
  color:"#fff",
  fontSize:14,
  fontWeight:800,
  cursor:"pointer"
};

const btnGold = { ...btnBase, background:"linear-gradient(135deg,#c0a062,#8b6914)" };
const btnGreen = { ...btnBase, background:"#16a34a" };
const btnRed = { ...btnBase, background:"#991b1b" };
const btnDark = { ...btnBase, background:"#312e81" };

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
